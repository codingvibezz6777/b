{% load static %}
<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Password Reset Success - StarBooking</title>
<link rel="icon" type="image/x-icon" href="{% static 'images/icoweb.png' %}">
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2cc0d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221f10",
                        "surface-dark": "#2d2a1a", 
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display text-slate-900 dark:text-white transition-colors duration-200">
<!-- Top Navigation / Logo Area -->

<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-4 relative overflow-hidden">
<!-- Abstract Background Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[80px]"></div>
</div>
<div class="w-full max-w-[480px] z-10">
<!-- Central Card -->
<div class="bg-surface-light dark:bg-surface-dark border border-gray-100 dark:border-[#494222] rounded-xl shadow-xl overflow-hidden p-8 md:p-12 flex flex-col items-center text-center">
<!-- Success Icon -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl animate-pulse"></div>
<div class="relative size-20 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;">check_circle</span>
</div>
</div>
<!-- Text Content -->
<h1 class="text-3xl font-extrabold tracking-tight mb-4 text-slate-900 dark:text-white">
                    Success!
                </h1>
<p class="text-slate-500 dark:text-[#cbc190] text-base leading-relaxed mb-8">
                    Your password has been successfully reset. You can now log in with your new credentials to access your account.
                </p>
<!-- Primary Action -->
<a href="{% url 'admin_login' %}" class="w-full bg-primary hover:bg-[#d9b60b] text-[#232010] font-bold text-base h-12 rounded-lg transition-all duration-200 transform hover:scale-[1.01] flex items-center justify-center gap-2">
<span>Sign In Now</span>
<span class="material-symbols-outlined text-xl">login</span>
</a>
</div>

</div>
</main>
<!-- Simple Footer -->
<footer class="py-6 text-center">
<p class="text-xs text-slate-400 dark:text-[#685f31]">© 2024 StarBooking. All rights reserved.</p>
</footer>
</body></html>
