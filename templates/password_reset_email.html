<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;padding:40px;box-shadow:0 5px 20px rgba(0,0,0,0.05);">

                    <!-- Logo -->
                    <tr>
                        <td align="center" style="padding-bottom:20px;">
                            <img src="https://yourdomain.com/static/images/logo.png" width="120" alt="YourBrand">
                        </td>
                    </tr>

                    <!-- Title -->
                    <tr>
                        <td align="center" style="font-size:22px;font-weight:bold;color:#111827;padding-bottom:10px;">
                            Reset Your Password
                        </td>
                    </tr>

                    <!-- Message -->
                    <tr>
                        <td style="font-size:14px;color:#6b7280;text-align:center;padding-bottom:30px;">
                            Hi {{ user.get_username }},
                            <br><br>
                            We received a request to reset your password.
                            Click the button below to set a new one.
                        </td>
                    </tr>

                    <!-- Button -->
                    <tr>
                        <td align="center">
                            <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
                               style="background:#0f172a;color:#ffffff;text-decoration:none;padding:12px 25px;border-radius:6px;font-size:14px;display:inline-block;">
                                Reset Password
                            </a>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="font-size:12px;color:#9ca3af;text-align:center;padding-top:30px;">
                            If you didn’t request this, you can safely ignore this email.
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>
</html>
